<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 日历助理</title>

<style>
body {
  background:#0b0f1a;
  color:#fff;
  font-family: Arial;
  padding:20px;
}
.container {
  max-width:500px;
  margin:auto;
}
textarea {
  width:100%;
  height:80px;
  margin-bottom:10px;
}
button {
  padding:10px;
  cursor:pointer;
}
.card {
  border:1px solid #333;
  padding:12px;
  margin-top:10px;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="container">

<h2>AI 日历助理（对话版）</h2>

<textarea id="transcriptBox" placeholder="说点什么，比如：下周三下午2点去工地"></textarea>

<button onclick="processTranscript()">发送</button>

<div id="loadingBar" style="display:none;margin-top:10px;">AI处理中...</div>

<div id="aiResult" style="margin-top:20px;"></div>

</div>

<script>

// ===== 原有变量 =====
let currentTranscript = '';
let accessToken = localStorage.getItem('gat');

// ===== 新增状态 =====
let conversationMode = false;
let currentDraftEvent = null;

// ===== Claude =====
async function callClaude(system, message) {
  const res = await fetch('/api/claude', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({system,message})
  });
  const data = await res.json();
  return data.text;
}

// ===== 工具 =====
function clean(t){
  return t.replace(/```json|```/g,'').trim();
}

function isModification(text){
  return ['改','换','调整','推迟','提前'].some(w=>text.includes(w));
}

// ===== 主逻辑 =====
async function processTranscript(){

  currentTranscript = transcriptBox.value.trim();
  if(!currentTranscript) return;

  loadingBar.style.display = 'block';

  try {

    // ===== 修改 =====
    if (isModification(currentTranscript) && currentDraftEvent) {

      const raw = await callClaude(
`当前事件：
${JSON.stringify(currentDraftEvent)}

用户修改：
${currentTranscript}

返回JSON：
{"event":{}}`
      );

      const obj = JSON.parse(clean(raw));
      currentDraftEvent = obj.event;

      loadingBar.style.display = 'none';

      speak("已修改");
      showEvent(currentDraftEvent);
      return;
    }

    // ===== 对话补充 =====
    if (conversationMode) {

      const raw = await callClaude(
`当前事件：
${JSON.stringify(currentDraftEvent)}

用户补充：
${currentTranscript}

返回JSON：
{"complete":true,"event":{},"reply":""}`
      );

      const obj = JSON.parse(clean(raw));
      currentDraftEvent = obj.event;

      if (!obj.complete) {
        loadingBar.style.display = 'none';
        speak(obj.reply);
        return;
      }

      conversationMode = false;

      loadingBar.style.display = 'none';
      showEvent(obj.event);
      return;
    }

    // ===== 初次解析 =====
    const raw = await callClaude(
`你是日历助手。

返回JSON：
{
 "complete": true/false,
 "event": {
   "title":"",
   "date":"",
   "time":"",
   "duration":60,
   "people":"",
   "location":""
 },
 "reply":"如果缺信息就问"
}`,
    currentTranscript);

    const obj = JSON.parse(clean(raw));
    currentDraftEvent = obj.event;

    if (!obj.complete) {
      conversationMode = true;
      loadingBar.style.display = 'none';
      speak(obj.reply);
      return;
    }

    loadingBar.style.display = 'none';
    showEvent(obj.event);

  } catch(e){
    loadingBar.style.display = 'none';
    alert("AI错误：" + e.message);
  }
}

// ===== UI展示 =====
function showEvent(ev){

  aiResult.innerHTML = `
  <div class="card">
    <b>${ev.title}</b><br>
    ${ev.date} ${ev.time}<br>
    ${ev.people||''} ${ev.location||''}
    <br><br>
    <button onclick="confirmAdd()">加入日历</button>
  </div>`;
}

// ===== 写入日历 =====
async function confirmAdd(){

  const ev = currentDraftEvent;

  const [h,m] = ev.time.split(':');

  const d = new Date(ev.date.replace(/年|月/g,'-').replace('日',''));

  const start = new Date(d.getFullYear(), d.getMonth(), d.getDate(), h, m);

  await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events', {
    method:'POST',
    headers:{
      Authorization:`Bearer ${accessToken}`,
      'Content-Type':'application/json'
    },
    body:JSON.stringify({
      summary: ev.title,
      start:{dateTime:start.toISOString(), timeZone:'Australia/Sydney'},
      end:{dateTime:new Date(start.getTime()+3600000).toISOString(), timeZone:'Australia/Sydney'}
    })
  });

  speak("已加入日历");

  conversationMode = false;
  currentDraftEvent = null;
}

// ===== 语音反馈 =====
function speak(text){
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'zh-CN';
  speechSynthesis.speak(u);
}

</script>

</body>
</html>
