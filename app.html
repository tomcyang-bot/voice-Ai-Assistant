<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 日历助理</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#07090f;--cyan:#00e5ff;--surface:#0e1220;--surface2:#141928;--border:rgba(0,229,255,0.1);--border2:rgba(0,229,255,0.22);--text:#d0ddf0;--muted:#3d5070;--muted2:#607090;--white:#edf4ff;--warn:#ff5e5e;--gold:#ffc844;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,229,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;}
.app{max-width:440px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;position:relative;z-index:1;}

/* Header */
.header{padding:16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:rgba(7,9,15,0.88);backdrop-filter:blur(20px);position:sticky;top:0;z-index:100;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-box{width:32px;height:32px;border:1px solid var(--cyan);display:flex;align-items:center;justify-content:center;clip-path:polygon(0 0,calc(100% - 7px) 0,100% 7px,100% 100%,7px 100%,0 calc(100% - 7px));background:rgba(0,229,255,0.06);}
.logo-box span{font-size:10px;color:var(--cyan);font-weight:700;}
.logo-text{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:var(--white);}
.logo-text em{color:var(--cyan);font-style:normal;}
.user-info{display:flex;align-items:center;gap:8px;}
.user-email{font-size:10px;color:var(--muted2);max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.user-avatar{width:30px;height:30px;border-radius:50%;border:1.5px solid var(--border2);background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--cyan);cursor:pointer;}
.live-dot{width:7px;height:7px;background:#00ffcc;border-radius:50%;box-shadow:0 0 8px #00ffcc;animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.4;}}

/* Loading */
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;gap:16px;}
.spin{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--cyan);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-screen p{font-size:13px;color:var(--muted2);}

/* Main */
.scroll{flex:1;overflow-y:auto;padding-bottom:100px;}
.scroll::-webkit-scrollbar{width:0;}

/* Voice */
.voice-wrap{padding:14px;}
.voice-card{background:linear-gradient(135deg,rgba(0,229,255,0.06),rgba(61,106,255,0.06));border:1px solid var(--border2);border-radius:20px;padding:18px;}
.vc-top{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.mic-btn{width:50px;height:50px;border-radius:50%;background:var(--surface2);border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .3s;flex-shrink:0;}
.mic-btn.on{border-color:var(--cyan);background:rgba(0,229,255,0.1);box-shadow:0 0 0 0 rgba(0,229,255,0.4);animation:sonar 1.2s ease-out infinite;}
@keyframes sonar{0%{box-shadow:0 0 0 0 rgba(0,229,255,0.4);}100%{box-shadow:0 0 0 20px rgba(0,229,255,0);}}
.vc-info h3{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--white);margin-bottom:2px;}
.vc-info p{font-size:11px;color:var(--muted2);}
.waves{display:flex;gap:3px;align-items:center;justify-content:center;height:28px;margin-bottom:12px;}
.w{width:3px;background:var(--cyan);border-radius:2px;opacity:.2;}
.waves.on .w{opacity:1;animation:wa .8s ease-in-out infinite alternate;}
.w:nth-child(1){height:6px;} .w:nth-child(2){height:14px;} .w:nth-child(3){height:22px;} .w:nth-child(4){height:28px;} .w:nth-child(5){height:18px;} .w:nth-child(6){height:24px;} .w:nth-child(7){height:10px;} .w:nth-child(8){height:20px;}
.waves.on .w:nth-child(1){animation-delay:.0s;}.waves.on .w:nth-child(2){animation-delay:.1s;}.waves.on .w:nth-child(3){animation-delay:.2s;}.waves.on .w:nth-child(4){animation-delay:.3s;}.waves.on .w:nth-child(5){animation-delay:.15s;}.waves.on .w:nth-child(6){animation-delay:.25s;}.waves.on .w:nth-child(7){animation-delay:.05s;}.waves.on .w:nth-child(8){animation-delay:.35s;}
@keyframes wa{from{transform:scaleY(.3);}to{transform:scaleY(1.2);}}
.tbox{background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:12px;padding:12px 14px;min-height:48px;font-size:13px;color:var(--text);line-height:1.6;margin-bottom:10px;cursor:text;outline:none;}
.tbox-placeholder{color:var(--muted);font-style:italic;font-size:12px;}
.ai-reply{background:rgba(0,229,255,.05);border:1px solid rgba(0,229,255,.15);border-radius:12px;padding:12px 14px;margin-bottom:10px;display:none;}
.ai-reply.show{display:block;}
.ai-lbl{font-size:9px;color:var(--cyan);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;}
.ai-event{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;display:flex;align-items:center;gap:10px;margin-top:8px;}
.ae-bar{width:3px;border-radius:2px;align-self:stretch;flex-shrink:0;background:var(--cyan);}
.ae-info{flex:1;}
.ae-title{font-size:12px;font-weight:600;color:var(--white);margin-bottom:2px;}
.ae-meta{font-size:10px;color:var(--muted2);}
.ae-btn{padding:5px 12px;background:rgba(0,229,255,.1);border:1px solid rgba(0,229,255,.2);color:var(--cyan);border-radius:8px;font-size:10px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;white-space:nowrap;}
.ae-btn.done{background:rgba(0,255,204,.1);border-color:rgba(0,255,204,.2);color:#00ffcc;}
.loading-bar{display:none;align-items:center;gap:8px;padding:8px 12px;background:rgba(0,229,255,.04);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;font-size:11px;color:var(--muted2);}
.loading-bar.show{display:flex;}
.spin-sm{width:12px;height:12px;border:2px solid var(--border);border-top-color:var(--cyan);border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0;}
.btns{display:flex;gap:8px;}
.btn{flex:1;padding:11px;border-radius:12px;font-size:12px;font-weight:700;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;text-transform:uppercase;letter-spacing:.3px;}
.btn-rec{background:var(--cyan);color:var(--bg);clip-path:polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,8px 100%,0 calc(100% - 8px));}
.btn-rec.on{background:var(--warn);}
.btn-ai{flex:.8;background:rgba(61,106,255,.15);border:1px solid rgba(61,106,255,.3);color:#7a9aff;}
.btn-ai:disabled{opacity:.4;cursor:not-allowed;}
.qcmds{display:flex;gap:5px;flex-wrap:wrap;margin-top:10px;}
.qcmd{font-size:10px;padding:5px 10px;background:var(--surface);border:1px solid var(--border);border-radius:20px;color:var(--muted2);cursor:pointer;transition:all .2s;}
.qcmd:hover{border-color:var(--cyan);color:var(--cyan);}

/* Calendar */
.cal-wrap{padding:0 14px;}
.sec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.sec-title{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted2);}
.week-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.wnav-btn{background:var(--surface);border:1px solid var(--border);color:var(--muted2);padding:6px 12px;border-radius:8px;cursor:pointer;font-size:11px;font-family:'DM Sans',sans-serif;}
.week-strip{display:flex;gap:4px;margin-bottom:12px;}
.wd{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 4px;border-radius:10px;cursor:pointer;transition:all .2s;border:1px solid transparent;}
.wd.today{background:var(--surface2);border-color:var(--border2);}
.wd.selected{background:var(--surface2);border-color:rgba(0,229,255,.35);}
.wd-name{font-size:9px;color:var(--muted2);text-transform:uppercase;letter-spacing:.5px;}
.wd-num{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--muted2);}
.wd.today .wd-num,.wd.today .wd-name{color:var(--cyan);}
.wd.selected .wd-num{color:var(--cyan);}
.wd-dot{width:4px;height:4px;background:var(--cyan);border-radius:50%;margin:0 auto;visibility:hidden;}
.tl-event{background:var(--surface);border:1px solid var(--border);border-left:3px solid #ea4335;border-radius:12px;padding:11px 13px;display:flex;gap:11px;align-items:center;cursor:pointer;transition:all .2s;margin-bottom:6px;}
.tl-event.voice-ev{border-left-color:var(--cyan);}
.tl-event:hover{border-color:var(--border2);}
.tl-t{text-align:center;min-width:38px;flex-shrink:0;}
.tl-h{font-family:'Syne',sans-serif;font-size:14px;font-weight:800;color:var(--cyan);line-height:1;}
.tl-ap{font-size:9px;color:var(--muted2);text-transform:uppercase;}
.tl-div{width:1px;background:var(--border);align-self:stretch;}
.tl-info h4{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:var(--white);margin-bottom:2px;}
.tl-info p{font-size:10px;color:var(--muted2);}
.tl-src{margin-left:auto;font-size:9px;padding:2px 7px;border-radius:20px;font-weight:600;white-space:nowrap;background:rgba(234,67,53,.1);color:#ea4335;}
.tl-src.vs{background:rgba(0,229,255,.1);color:var(--cyan);}
.empty-cal{text-align:center;padding:24px;border:1px dashed var(--border);border-radius:12px;margin-bottom:8px;}
.empty-cal p{font-size:12px;color:var(--muted2);line-height:1.7;}

/* Week all */
.week-group{margin-bottom:10px;}
.week-day-lbl{font-size:10px;color:var(--cyan);letter-spacing:1px;margin-bottom:5px;padding:0 2px;}
.week-ev-chip{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:8px 12px;display:flex;align-items:center;gap:8px;margin-bottom:4px;cursor:pointer;}
.wec-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.wec-title{font-size:12px;font-weight:600;color:var(--text);}
.wec-time{font-size:10px;color:var(--muted2);}

/* Toast */
.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%) translateY(-12px);background:var(--surface2);border:1px solid rgba(0,229,255,.3);border-radius:10px;padding:8px 16px;font-size:11px;color:var(--cyan);font-weight:500;opacity:0;transition:all .3s;z-index:999;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* Bottom nav */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:440px;background:rgba(7,9,15,.95);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;padding:10px 0 18px;z-index:100;}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:5px;border-radius:10px;margin:0 3px;transition:all .2s;}
.ni.active{background:rgba(0,229,255,.06);}
.ni svg{width:18px;height:18px;}
.ni-lbl{font-size:9px;color:var(--muted2);font-weight:500;text-transform:uppercase;}
.ni.active .ni-lbl{color:var(--cyan);}
</style>
</head>
<body>
<div class="toast" id="toast"></div>
<div class="app">

  <div class="header">
    <div class="logo">
      <div class="logo-box"><span>AI</span></div>
      <div class="logo-text">Cal<em>Voice</em></div>
    </div>
    <div class="user-info">
      <div class="user-email" id="userEmail"></div>
      <div class="user-avatar" id="userAvatar" onclick="logout()">?</div>
      <div class="live-dot"></div>
    </div>
  </div>

  <div class="loading-screen" id="loadingScreen">
    <div class="spin"></div>
    <p id="loadingMsg">正在加载...</p>
    <p style="font-size:10px;color:var(--muted);margin-top:4px" id="loadingDebug"></p>
  </div>

  <div class="scroll" id="mainContent" style="display:none">

    <!-- Voice -->
    <div class="voice-wrap">
      <div class="voice-card">
        <div class="vc-top">
          <div class="mic-btn" id="micBtn" onclick="toggleRec()">
            <svg width="20" height="20" fill="none" viewBox="0 0 24 24">
              <path d="M12 2a3 3 0 0 1 3 3v7a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3z" fill="#00e5ff"/>
              <path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v3M9 22h6" stroke="#00e5ff" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </div>
          <div class="vc-info">
            <h3 id="vcStatus">点击说话或直接输入</h3>
            <p>AI 识别日程，自动加入 Google 日历</p>
          </div>
        </div>
        <div class="waves" id="waves">
          <div class="w"></div><div class="w"></div><div class="w"></div><div class="w"></div>
          <div class="w"></div><div class="w"></div><div class="w"></div><div class="w"></div>
        </div>
        <div class="tbox" id="tbox" contenteditable="true" 
          onclick="if(this.innerHTML.includes('tbox-placeholder'))this.innerHTML=''"
          oninput="onInput()">
          <span class="tbox-placeholder">说出日程，或在这里打字...</span>
        </div>
        <div class="loading-bar" id="loadingBar">
          <div class="spin-sm"></div>
          <span id="loadingBarMsg">AI 分析中...</span>
        </div>
        <div class="ai-reply" id="aiReply">
          <div class="ai-lbl">AI 回复</div>
          <div id="aiReplyText" style="font-size:13px;color:var(--text);line-height:1.7;padding:4px 0"></div>
          <div id="aiEventCard"></div>
        </div>
        <div class="btns">
          <button class="btn btn-rec" id="recBtn" onclick="toggleRec()">🎙 开始录音</button>
          <button class="btn btn-ai" id="aiBtn" onclick="process()" disabled>✦ AI 分析</button>
        </div>
        <div class="qcmds">
          <div class="qcmd" onclick="setInput('下周一下午3点和Mike开会')">下周一3点开会</div>
          <div class="qcmd" onclick="setInput('明天上午10点见客户')">明天见客户</div>
          <div class="qcmd" onclick="setInput('今天有什么安排？')">今天安排</div>
        </div>
      </div>
    </div>

    <!-- Calendar -->
    <div class="cal-wrap">
      <div class="sec-hd">
        <div class="sec-title">日历</div>
        <div style="font-size:11px;color:var(--cyan);cursor:pointer" onclick="loadCal()">🔄 刷新</div>
      </div>
      <div class="week-nav">
        <button class="wnav-btn" onclick="changeWeek(-1)">← 上周</button>
        <div style="font-size:12px;color:var(--text);font-weight:600" id="weekLabel"></div>
        <button class="wnav-btn" onclick="changeWeek(1)">下周 →</button>
      </div>
      <div class="week-strip" id="weekStrip"></div>
      <div class="sec-hd">
        <div class="sec-title" id="dayLabel">今日日程</div>
        <div style="font-size:11px;color:var(--muted2)" id="evCount"></div>
      </div>
      <div id="dayEvents"></div>
      <div class="sec-hd" style="margin-top:12px">
        <div class="sec-title">本周总览</div>
      </div>
      <div id="weekEvents"></div>
    </div>

  </div>

  <div class="bnav">
    <div class="ni active">
      <svg fill="none" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" stroke="#00e5ff" stroke-width="1.8"/><line x1="3" y1="10" x2="21" y2="10" stroke="#00e5ff" stroke-width="1.8"/><line x1="8" y1="2" x2="8" y2="6" stroke="#00e5ff" stroke-width="1.8" stroke-linecap="round"/><line x1="16" y1="2" x2="16" y2="6" stroke="#00e5ff" stroke-width="1.8" stroke-linecap="round"/></svg>
      <div class="ni-lbl" style="color:var(--cyan)">日历</div>
    </div>
    <div class="ni" onclick="showToast('Gmail 扫描即将上线')">
      <svg fill="none" viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" stroke="currentColor" stroke-width="1.8"/><polyline points="22,6 12,13 2,6" stroke="currentColor" stroke-width="1.8"/></svg>
      <div class="ni-lbl">邮件</div>
    </div>
    <div class="ni" onclick="logout()">
      <svg fill="none" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <div class="ni-lbl">退出</div>
    </div>
  </div>

</div>
<script>
// ── Config ──
const CLIENT_ID = '387089537159-1ndbikl7qbe388llbgv3lcvmut4jik70.apps.googleusercontent.com';

// ── State ──
let token = null;
let isRec = false;
let recog = null;
let transcript = '';
let chatHistory = [];
let weekOffset = 0;
let selectedDate = new Date();
let weekEvents = [];

// ── Date Calculator ──
function getDateMap() {
  const t = new Date();
  const dow = t.getDay();
  const thisMon = new Date(t);
  thisMon.setDate(t.getDate() - (dow === 0 ? 6 : dow - 1));
  thisMon.setHours(0,0,0,0);
  const nextMon = new Date(thisMon);
  nextMon.setDate(thisMon.getDate() + 7);
  const fmt = d => d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日';
  const add = (b,n) => { const d=new Date(b); d.setDate(b.getDate()+n); return d; };
  return {
    today:{label:'今天',date:new Date(t),fmt:fmt(t)},
    tomorrow:{label:'明天',date:add(t,1),fmt:fmt(add(t,1))},
    day_after:{label:'后天',date:add(t,2),fmt:fmt(add(t,2))},
    this_mon:{label:'本周一',date:thisMon,fmt:fmt(thisMon)},
    this_tue:{label:'本周二',date:add(thisMon,1),fmt:fmt(add(thisMon,1))},
    this_wed:{label:'本周三',date:add(thisMon,2),fmt:fmt(add(thisMon,2))},
    this_thu:{label:'本周四',date:add(thisMon,3),fmt:fmt(add(thisMon,3))},
    this_fri:{label:'本周五',date:add(thisMon,4),fmt:fmt(add(thisMon,4))},
    this_sat:{label:'本周六',date:add(thisMon,5),fmt:fmt(add(thisMon,5))},
    next_mon:{label:'下周一',date:nextMon,fmt:fmt(nextMon)},
    next_tue:{label:'下周二',date:add(nextMon,1),fmt:fmt(add(nextMon,1))},
    next_wed:{label:'下周三',date:add(nextMon,2),fmt:fmt(add(nextMon,2))},
    next_thu:{label:'下周四',date:add(nextMon,3),fmt:fmt(add(nextMon,3))},
    next_fri:{label:'下周五',date:add(nextMon,4),fmt:fmt(add(nextMon,4))},
    next_sat:{label:'下周六',date:add(nextMon,5),fmt:fmt(add(nextMon,5))},
    next_sun:{label:'下周日',date:add(nextMon,6),fmt:fmt(add(nextMon,6))},
  };
}

function dateCtxStr() {
  const m = getDateMap();
  return Object.entries(m).map(([k,v])=>`${k}=${v.fmt}`).join(', ');
}

function resolveKey(key) {
  return getDateMap()[key] || getDateMap()['today'];
}

// ── Auth ──
window.addEventListener('load', () => {
  const dbg = document.getElementById('loadingDebug');

  // Method 1: Token in URL hash (from callback.html backup)
  const hash = window.location.hash;
  if (hash && hash.includes('gat=')) {
    const t = hash.split('gat=')[1];
    if (t && t.length > 10) {
      token = t;
      try {
        localStorage.setItem('gat', t);
        localStorage.setItem('gat_time', Date.now().toString());
      } catch(e) {}
      history.replaceState(null, '', window.location.pathname);
      dbg.textContent = 'Token from URL ✓';
      showApp();
      return;
    }
  }

  // Method 2: Token in localStorage
  const stored = localStorage.getItem('gat');
  if (stored && stored.length > 10) {
    token = stored;
    dbg.textContent = 'Token from storage ✓';
    showApp();
    return;
  }

  // No token
  dbg.textContent = '无Token，跳转登录...';
  setTimeout(() => { window.location.href = 'auth.html'; }, 800);
});

function showApp() {
  document.getElementById('loadingScreen').style.display = 'none';
  document.getElementById('mainContent').style.display = 'block';
  initSpeech();
  buildWeek();
  loadCal();
  // Get user info silently
  fetch('https://www.googleapis.com/oauth2/v2/userinfo', {
    headers: { Authorization: 'Bearer ' + token }
  }).then(r => {
    if (r.status === 401) {
      localStorage.removeItem('gat');
      showToast('登录已过期，请重新登录');
      setTimeout(() => { window.location.href = 'auth.html'; }, 2000);
      return;
    }
    return r.json();
  }).then(u => {
    if (!u) return;
    document.getElementById('userEmail').textContent = u.email || '';
    const av = document.getElementById('userAvatar');
    av.textContent = u.name ? u.name[0].toUpperCase() : '✓';
    if (u.picture) {
      av.style.backgroundImage = 'url('+u.picture+')';
      av.style.backgroundSize = 'cover';
      av.style.fontSize = '0';
    }
    showToast('✓ 已连接 ' + u.email);
  }).catch(() => {
    document.getElementById('userAvatar').textContent = '✓';
  });
}

function logout() {
  localStorage.removeItem('gat');
  window.location.href = 'auth.html';
}

// ── Claude API ──
async function callAI(system, userMsg) {
  chatHistory.push({ role: 'user', content: userMsg });
  const ctrl = new AbortController();
  const t = setTimeout(() => ctrl.abort(), 25000);
  try {
    const res = await fetch('/api/claude', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ system, messages: chatHistory }),
      signal: ctrl.signal
    });
    clearTimeout(t);
    if (!res.ok) throw new Error('API ' + res.status);
    const d = await res.json();
    chatHistory.push({ role: 'assistant', content: d.text });
    return d.text;
  } catch(e) {
    clearTimeout(t);
    chatHistory.pop();
    throw e.name === 'AbortError' ? new Error('超时，请重试') : e;
  }
}

// ── Voice ──
function initSpeech() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    document.getElementById('recBtn').textContent = '⌨️ 请直接输入';
    document.getElementById('vcStatus').textContent = '请在框内直接打字';
  }
}

async function toggleRec() {
  if (isRec) {
    recog && recog.abort();
    recog = null;
    stopRec();
    return;
  }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { showToast('请直接在框内打字'); return; }

  try {
    const s = await navigator.mediaDevices.getUserMedia({ audio: true });
    s.getTracks().forEach(t => t.stop());
  } catch(e) {
    document.getElementById('tbox').innerHTML = '<span style="color:var(--warn);font-size:12px">请在设置里允许麦克风：设置 → Safari → 麦克风 → 允许</span>';
    return;
  }

  recog = new SR();
  recog.lang = 'zh-CN';
  recog.continuous = false;
  recog.interimResults = true;

  recog.onstart = () => {
    isRec = true;
    document.getElementById('micBtn').classList.add('on');
    document.getElementById('waves').classList.add('on');
    document.getElementById('vcStatus').textContent = '🔴 正在聆听...';
    document.getElementById('recBtn').textContent = '⏹ 停止';
    document.getElementById('recBtn').classList.add('on');
    document.getElementById('tbox').innerHTML = '';
    document.getElementById('aiReply').classList.remove('show');
    document.getElementById('aiBtn').disabled = true;
  };

  recog.onresult = e => {
    let txt = '';
    for (let i = e.resultIndex; i < e.results.length; i++) txt += e.results[i][0].transcript;
    transcript = txt;
    document.getElementById('tbox').textContent = txt;
  };

  recog.onend = () => {
    stopRec();
    if (transcript.trim()) document.getElementById('aiBtn').disabled = false;
  };

  recog.onerror = e => {
    stopRec();
    if (e.error === 'not-allowed') showToast('请允许麦克风权限');
    else showToast('语音错误: ' + e.error);
  };

  try { recog.start(); } catch(e) { showToast('启动失败，请重试'); }
}

function stopRec() {
  isRec = false;
  document.getElementById('micBtn').classList.remove('on');
  document.getElementById('waves').classList.remove('on');
  document.getElementById('vcStatus').textContent = '点击说话或直接输入';
  document.getElementById('recBtn').textContent = '🎙 开始录音';
  document.getElementById('recBtn').classList.remove('on');
}

function onInput() {
  const txt = document.getElementById('tbox').innerText.trim();
  transcript = txt;
  document.getElementById('aiBtn').disabled = !txt || txt === '说出日程，或在这里打字...';
}

function setInput(txt) {
  transcript = txt;
  document.getElementById('tbox').textContent = txt;
  document.getElementById('aiBtn').disabled = false;
  showToast('已填入，点击 AI 分析');
}

// ── Process ──
async function process() {
  if (!transcript.trim()) return;
  document.getElementById('aiReply').classList.remove('show');
  document.getElementById('loadingBar').classList.add('show');
  document.getElementById('loadingBarMsg').textContent = 'AI 分析中...';
  document.getElementById('aiBtn').disabled = true;

  const system = `你是AI日历助理，负责多轮对话收集日程信息。
日期对应（由系统计算，直接用）：${dateCtxStr()}

规则：
1. 信息足够 → 返回JSON: {"action":"create","title":"事件名","day_key":"next_mon","time":"14:00","duration":60,"people":"","location":""}
2. 信息不足 → 返回JSON: {"action":"ask","reply":"追问内容"}
3. 用户回答上一问题 → 合并上下文处理
4. 用户查询日程 → 返回JSON: {"action":"query","reply":"回答内容"}

day_key选项: today/tomorrow/day_after/this_mon~this_sat/next_mon~next_sun
只返回JSON，不加其他文字。`;

  try {
    const raw = await callAI(system, transcript);
    const clean = raw.replace(/```json|```/g,'').trim();
    const parsed = JSON.parse(clean);

    document.getElementById('loadingBar').classList.remove('show');
    document.getElementById('aiBtn').disabled = false;

    if (parsed.action === 'ask' || parsed.action === 'query') {
      speak(parsed.reply);
      document.getElementById('aiReplyText').textContent = parsed.reply;
      document.getElementById('aiEventCard').innerHTML = '';
      document.getElementById('aiReply').classList.add('show');

    } else if (parsed.action === 'create') {
      const resolved = resolveKey(parsed.day_key);
      const ev = {
        title: parsed.title,
        date: resolved.fmt,
        resolvedDate: resolved.date,
        time: parsed.time || '10:00',
        duration: parsed.duration || 60,
        people: parsed.people || '',
        location: parsed.location || ''
      };

      const msg = `好的，已为你安排 ${ev.title}，${resolved.label} ${ev.time}`;
      speak(msg);
      document.getElementById('aiReplyText').textContent = msg;

      const btnId = 'addBtn_' + Date.now();
      document.getElementById('aiEventCard').innerHTML = `
        <div class="ai-event">
          <div class="ae-bar"></div>
          <div class="ae-info">
            <div class="ae-title">${ev.title}</div>
            <div class="ae-meta">${ev.date} ${ev.time} · ${ev.duration}分钟${ev.people?' · '+ev.people:''}</div>
          </div>
          <button class="ae-btn" id="${btnId}" onclick="addEv(this, ${JSON.stringify(ev).replace(/"/g,'&quot;')})">+ 加入</button>
        </div>`;
      document.getElementById('aiReply').classList.add('show');

      // Auto-add after 2s
      setTimeout(() => {
        const b = document.getElementById(btnId);
        if (b && !b.classList.contains('done')) b.click();
      }, 2000);
    }
  } catch(e) {
    document.getElementById('loadingBar').classList.remove('show');
    document.getElementById('aiBtn').disabled = false;
    showToast('分析失败: ' + e.message);
  }
}

async function addEv(btn, ev) {
  btn.textContent = '添加中...';
  btn.disabled = true;
  try {
    const [h,m] = ev.time.split(':').map(Number);
    const base = ev.resolvedDate ? new Date(ev.resolvedDate) : new Date();
    const start = new Date(base.getFullYear(), base.getMonth(), base.getDate(), h, m);
    const end = new Date(start.getTime() + (ev.duration||60)*60000);

    const res = await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events', {
      method: 'POST',
      headers: { Authorization: 'Bearer '+token, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        summary: ev.title,
        description: ev.people ? '参与人: '+ev.people : '',
        location: ev.location || '',
        start: { dateTime: start.toISOString(), timeZone: 'Australia/Sydney' },
        end: { dateTime: end.toISOString(), timeZone: 'Australia/Sydney' }
      })
    });

    if (!res.ok) throw new Error('Calendar API ' + res.status);
    btn.textContent = '✓ 已加入';
    btn.classList.add('done');
    showToast('✓ "' + ev.title + '" 已加入日历');
    chatHistory = []; // Reset conversation after successful add
    await loadCal();
  } catch(e) {
    btn.textContent = '+ 加入';
    btn.disabled = false;
    showToast('添加失败: ' + e.message);
  }
}

// ── TTS ──
function speak(txt) {
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(txt);
  u.lang = 'zh-CN'; u.rate = 0.95;
  const voices = window.speechSynthesis.getVoices();
  const zh = voices.find(v => v.lang.includes('zh'));
  if (zh) u.voice = zh;
  window.speechSynthesis.speak(u);
}

// ── Calendar ──
function changeWeek(d) { weekOffset += d; buildWeek(); loadCal(); }

function buildWeek() {
  const strip = document.getElementById('weekStrip');
  strip.innerHTML = '';
  const days = ['一','二','三','四','五','六','日'];
  const today = new Date();
  const dow = today.getDay();
  const off = (dow===0?-6:1-dow) + weekOffset*7;
  const mon = new Date(today); mon.setDate(today.getDate()+off);
  const sun = new Date(mon); sun.setDate(mon.getDate()+6);
  const wl = document.getElementById('weekLabel');
  if (wl) wl.textContent = (mon.getMonth()+1)+'月'+mon.getDate()+'日 — '+(sun.getMonth()+1)+'月'+sun.getDate()+'日';

  for (let i=0; i<7; i++) {
    const d = new Date(today); d.setDate(today.getDate()+off+i);
    const isToday = d.toDateString()===today.toDateString();
    const isSel = d.toDateString()===selectedDate.toDateString();
    const el = document.createElement('div');
    el.className = 'wd' + (isToday?' today':'') + (isSel&&!isToday?' selected':'');
    el.innerHTML = `<div class="wd-name">周${days[i]}</div><div class="wd-num">${d.getDate()}</div><div class="wd-dot" id="dot${i}"></div>`;
    const cap = new Date(d);
    el.onclick = () => { selectedDate=cap; buildWeek(); renderDay(weekEvents.filter(e=>new Date(e.start.dateTime||e.start.date).toDateString()===cap.toDateString())); };
    strip.appendChild(el);
  }
}

async function loadCal() {
  document.getElementById('dayEvents').innerHTML = '<div class="empty-cal"><p>加载中...</p></div>';
  try {
    const today = new Date();
    const dow = today.getDay();
    const off = (dow===0?-6:1-dow) + weekOffset*7;
    const wStart = new Date(today); wStart.setDate(today.getDate()+off); wStart.setHours(0,0,0,0);
    const wEnd = new Date(wStart); wEnd.setDate(wStart.getDate()+7);

    const res = await fetch(
      `https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${wStart.toISOString()}&timeMax=${wEnd.toISOString()}&singleEvents=true&orderBy=startTime`,
      { headers: { Authorization: 'Bearer '+token } }
    );
    if (res.status===401) { localStorage.removeItem('gat'); window.location.href='auth.html'; return; }
    const data = await res.json();
    weekEvents = data.items || [];

    // Update dots
    document.querySelectorAll('.wd').forEach((el,i) => {
      const d = new Date(today); d.setDate(today.getDate()+off+i);
      const has = weekEvents.some(e => new Date(e.start.dateTime||e.start.date).toDateString()===d.toDateString());
      const dot = document.getElementById('dot'+i);
      if (dot) dot.style.visibility = has ? 'visible' : 'hidden';
    });

    // Show selected day
    const selEvs = weekEvents.filter(e => new Date(e.start.dateTime||e.start.date).toDateString()===selectedDate.toDateString());
    renderDay(selEvs);
    renderWeek(weekEvents);
  } catch(e) {
    document.getElementById('dayEvents').innerHTML = '<div class="empty-cal"><p>加载失败，请刷新</p></div>';
  }
}

function renderDay(evs) {
  const dn = ['周日','周一','周二','周三','周四','周五','周六'];
  const lbl = document.getElementById('dayLabel');
  if (lbl) lbl.textContent = (selectedDate.getMonth()+1)+'月'+selectedDate.getDate()+'日 '+dn[selectedDate.getDay()];
  const cnt = document.getElementById('evCount');
  if (cnt) cnt.textContent = evs.length ? evs.length+'个' : '';
  const c = document.getElementById('dayEvents');
  if (!evs.length) { c.innerHTML = '<div class="empty-cal"><p>这天没有日程<br>用语音添加 🎙</p></div>'; return; }
  c.innerHTML = '';
  evs.forEach(ev => {
    const dt = ev.start.dateTime ? new Date(ev.start.dateTime) : null;
    const h = dt ? dt.getHours() : 0;
    const displayH = h>12?h-12:h;
    const mn = dt ? String(dt.getMinutes()).padStart(2,'0') : '00';
    const ap = h>=12?'PM':'AM';
    const el = document.createElement('div');
    el.className = 'tl-event';
    el.innerHTML = `
      <div class="tl-t"><div class="tl-h">${dt?displayH+':'+mn:'全天'}</div><div class="tl-ap">${dt?ap:''}</div></div>
      <div class="tl-div"></div>
      <div class="tl-info"><h4>${ev.summary||'无标题'}</h4><p>${ev.location||''}</p></div>
      <div class="tl-src">Calendar</div>`;
    c.appendChild(el);
  });
}

function renderWeek(evs) {
  const c = document.getElementById('weekEvents');
  if (!evs.length) { c.innerHTML = '<div class="empty-cal"><p>本周暂无日程</p></div>'; return; }
  const dn = ['周日','周一','周二','周三','周四','周五','周六'];
  const groups = {};
  evs.forEach(ev => {
    const d = new Date(ev.start.dateTime||ev.start.date);
    const k = d.toDateString();
    if (!groups[k]) groups[k] = { d, evs:[] };
    groups[k].evs.push(ev);
  });
  c.innerHTML = '';
  Object.values(groups).sort((a,b)=>a.d-b.d).forEach(g => {
    const el = document.createElement('div');
    el.className = 'week-group';
    el.innerHTML = `<div class="week-day-lbl">${g.d.getMonth()+1}月${g.d.getDate()}日 ${dn[g.d.getDay()]}</div>`;
    g.evs.forEach(ev => {
      const dt = ev.start.dateTime ? new Date(ev.start.dateTime) : null;
      const t = dt ? dt.toLocaleTimeString('zh',{hour:'2-digit',minute:'2-digit',hour12:false}) : '全天';
      const chip = document.createElement('div');
      chip.className = 'week-ev-chip';
      chip.innerHTML = `<div class="wec-dot" style="background:#ea4335"></div><div><div class="wec-title">${ev.summary||'无标题'}</div><div class="wec-time">${t}</div></div>`;
      el.appendChild(chip);
    });
    c.appendChild(el);
  });
}

// ── Toast ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
