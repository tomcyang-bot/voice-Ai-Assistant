<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simply Project AI</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#07090f;--cyan:#00e5ff;--surface:#0e1220;--surface2:#141928;--border:rgba(0,229,255,0.1);--border2:rgba(0,229,255,0.22);--text:#d0ddf0;--muted:#3d5070;--muted2:#607090;--white:#edf4ff;--warn:#ff5e5e;--gold:#ffc844;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,229,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;}
.app{max-width:440px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;position:relative;z-index:1;}

/* Header */
.header{padding:16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:rgba(7,9,15,0.88);backdrop-filter:blur(20px);position:sticky;top:0;z-index:100;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-box{width:32px;height:32px;border:1px solid var(--cyan);display:flex;align-items:center;justify-content:center;clip-path:polygon(0 0,calc(100% - 7px) 0,100% 7px,100% 100%,7px 100%,0 calc(100% - 7px));background:rgba(0,229,255,0.06);}
.logo-box span{font-size:10px;color:var(--cyan);font-weight:700;}
.logo-text{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:800;color:var(--white);letter-spacing:-.2px;}
.logo-text em{color:var(--cyan);font-style:normal;}
.user-info{display:flex;align-items:center;gap:8px;}
.user-email{font-size:10px;color:var(--muted2);max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.user-avatar{width:30px;height:30px;border-radius:50%;border:1.5px solid var(--border2);background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--cyan);cursor:pointer;}
.live-dot{width:7px;height:7px;background:#00ffcc;border-radius:50%;box-shadow:0 0 8px #00ffcc;animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.4;}}

/* Loading */
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;gap:16px;}
.spin{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--cyan);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-screen p{font-size:13px;color:var(--muted2);}

/* Main */
.scroll{flex:1;overflow-y:auto;padding-bottom:100px;}
.scroll::-webkit-scrollbar{width:0;}

/* Voice */
.voice-wrap{padding:14px;}
.voice-card{background:linear-gradient(135deg,rgba(0,229,255,0.06),rgba(61,106,255,0.06));border:1px solid var(--border2);border-radius:20px;padding:18px;}
.vc-top{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.mic-btn{width:50px;height:50px;border-radius:50%;background:var(--surface2);border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .3s;flex-shrink:0;}
.mic-btn.on{border-color:var(--cyan);background:rgba(0,229,255,0.1);box-shadow:0 0 0 0 rgba(0,229,255,0.4);animation:sonar 1.2s ease-out infinite;}
@keyframes sonar{0%{box-shadow:0 0 0 0 rgba(0,229,255,0.4);}100%{box-shadow:0 0 0 20px rgba(0,229,255,0);}}
.vc-info h3{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;color:var(--white);margin-bottom:2px;}
.vc-info p{font-size:11px;color:var(--muted2);}
.waves{display:flex;gap:3px;align-items:center;justify-content:center;height:28px;margin-bottom:12px;}
.w{width:3px;background:var(--cyan);border-radius:2px;opacity:.2;}
.waves.on .w{opacity:1;animation:wa .8s ease-in-out infinite alternate;}
.w:nth-child(1){height:6px;} .w:nth-child(2){height:14px;} .w:nth-child(3){height:22px;} .w:nth-child(4){height:28px;} .w:nth-child(5){height:18px;} .w:nth-child(6){height:24px;} .w:nth-child(7){height:10px;} .w:nth-child(8){height:20px;}
.waves.on .w:nth-child(1){animation-delay:.0s;}.waves.on .w:nth-child(2){animation-delay:.1s;}.waves.on .w:nth-child(3){animation-delay:.2s;}.waves.on .w:nth-child(4){animation-delay:.3s;}.waves.on .w:nth-child(5){animation-delay:.15s;}.waves.on .w:nth-child(6){animation-delay:.25s;}.waves.on .w:nth-child(7){animation-delay:.05s;}.waves.on .w:nth-child(8){animation-delay:.35s;}
@keyframes wa{from{transform:scaleY(.3);}to{transform:scaleY(1.2);}}
.tbox{background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:12px;padding:12px 14px;min-height:48px;font-size:13px;color:var(--text);line-height:1.6;margin-bottom:10px;cursor:text;outline:none;}
.tbox-placeholder{color:var(--muted);font-style:italic;font-size:12px;}
.ai-reply{background:rgba(0,229,255,.05);border:1px solid rgba(0,229,255,.15);border-radius:12px;padding:12px 14px;margin-bottom:10px;display:none;}
.ai-reply.show{display:block;}
.ai-lbl{font-size:9px;color:var(--cyan);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;}
.ai-event{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;display:flex;align-items:center;gap:10px;margin-top:8px;}
.ae-bar{width:3px;border-radius:2px;align-self:stretch;flex-shrink:0;background:var(--cyan);}
.ae-info{flex:1;}
.ae-title{font-size:12px;font-weight:600;color:var(--white);margin-bottom:2px;}
.ae-meta{font-size:10px;color:var(--muted2);}
.ae-btn{padding:5px 12px;background:rgba(0,229,255,.1);border:1px solid rgba(0,229,255,.2);color:var(--cyan);border-radius:8px;font-size:10px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;white-space:nowrap;}
.ae-btn.done{background:rgba(0,255,204,.1);border-color:rgba(0,255,204,.2);color:#00ffcc;}
.loading-bar{display:none;align-items:center;gap:8px;padding:8px 12px;background:rgba(0,229,255,.04);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;font-size:11px;color:var(--muted2);}
.loading-bar.show{display:flex;}
.spin-sm{width:12px;height:12px;border:2px solid var(--border);border-top-color:var(--cyan);border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0;}
.btns{display:flex;gap:8px;}
.btn{flex:1;padding:11px;border-radius:12px;font-size:12px;font-weight:700;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;text-transform:uppercase;letter-spacing:.3px;}
.btn-rec{background:var(--cyan);color:var(--bg);clip-path:polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,8px 100%,0 calc(100% - 8px));}
.btn-rec.on{background:var(--warn);}
.btn-ai{flex:.8;background:rgba(61,106,255,.15);border:1px solid rgba(61,106,255,.3);color:#7a9aff;}
.btn-ai:disabled{opacity:.4;cursor:not-allowed;}
.qcmds{display:flex;gap:5px;flex-wrap:wrap;margin-top:10px;}
.qcmd{font-size:10px;padding:5px 10px;background:var(--surface);border:1px solid var(--border);border-radius:20px;color:var(--muted2);cursor:pointer;transition:all .2s;}
.qcmd:hover{border-color:var(--cyan);color:var(--cyan);}

/* Calendar */
.cal-wrap{padding:0 14px;}
.sec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.sec-title{font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted2);}
.week-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.wnav-btn{background:var(--surface);border:1px solid var(--border);color:var(--muted2);padding:6px 12px;border-radius:8px;cursor:pointer;font-size:11px;font-family:'DM Sans',sans-serif;}
.week-strip{display:flex;gap:4px;margin-bottom:12px;}
.wd{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 4px;border-radius:10px;cursor:pointer;transition:all .2s;border:1px solid transparent;}
.wd.today{background:var(--surface2);border-color:var(--border2);}
.wd.selected{background:var(--surface2);border-color:rgba(0,229,255,.35);}
.wd-name{font-size:9px;color:var(--muted2);text-transform:uppercase;letter-spacing:.5px;}
.wd-num{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;color:var(--muted2);}
.wd.today .wd-num,.wd.today .wd-name{color:var(--cyan);}
.wd.selected .wd-num{color:var(--cyan);}
.wd-dot{width:4px;height:4px;background:var(--cyan);border-radius:50%;margin:0 auto;visibility:hidden;}
.tl-event{background:var(--surface);border:1px solid var(--border);border-left:3px solid #ea4335;border-radius:14px;padding:14px 14px;display:flex;gap:12px;align-items:center;cursor:pointer;transition:all .2s;margin-bottom:8px;position:relative;overflow:hidden;}
.tl-event::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,rgba(234,67,53,0.04),transparent 40%);pointer-events:none;}
.tl-event.voice-ev{border-left-color:var(--cyan);}
.tl-event.voice-ev::after{background:linear-gradient(90deg,rgba(0,229,255,0.04),transparent 40%);}
.tl-event:hover{border-color:var(--border2);transform:translateX(2px);}
.tl-t{text-align:center;min-width:44px;flex-shrink:0;background:rgba(0,229,255,0.06);border-radius:8px;padding:6px 4px;}
.tl-h{font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:800;color:var(--cyan);line-height:1;}
.tl-ap{font-size:9px;color:var(--muted2);text-transform:uppercase;letter-spacing:.5px;}
.tl-div{width:1px;background:var(--border);align-self:stretch;}
.tl-info{flex:1;}
.tl-info h4{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;color:var(--white);margin-bottom:4px;line-height:1.3;}
.tl-info p{font-size:11px;color:var(--muted2);display:flex;align-items:center;gap:4px;}
.tl-src{flex-shrink:0;font-size:9px;padding:3px 8px;border-radius:20px;font-weight:600;white-space:nowrap;background:rgba(234,67,53,.12);color:#ea4335;border:1px solid rgba(234,67,53,.2);}
.tl-src.vs{background:rgba(0,229,255,.1);color:var(--cyan);border-color:rgba(0,229,255,.2);}
.empty-cal{text-align:center;padding:28px 20px;border:1px dashed var(--border);border-radius:14px;margin-bottom:8px;}
.empty-cal .ec-icon{font-size:28px;margin-bottom:8px;opacity:.6;}
.empty-cal p{font-size:12px;color:var(--muted2);line-height:1.8;}

/* Week all */
.week-group{margin-bottom:10px;}
.week-day-lbl{font-size:10px;color:var(--cyan);letter-spacing:1px;margin-bottom:5px;padding:0 2px;}
.week-ev-chip{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 13px;display:flex;align-items:center;gap:10px;margin-bottom:5px;cursor:pointer;transition:all .2s;}
.week-ev-chip:hover{border-color:var(--border2);background:var(--surface2);}
.wec-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;box-shadow:0 0 6px currentColor;}
.wec-title{font-size:12px;font-weight:600;color:var(--text);}
.wec-time{font-size:10px;color:var(--muted2);margin-top:2px;}

/* Toast */
.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%) translateY(-12px);background:var(--surface2);border:1px solid rgba(0,229,255,.3);border-radius:10px;padding:8px 16px;font-size:11px;color:var(--cyan);font-weight:500;opacity:0;transition:all .3s;z-index:999;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* Bottom nav */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:440px;background:rgba(7,9,15,.95);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;padding:10px 0 18px;z-index:100;}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:5px;border-radius:10px;margin:0 3px;transition:all .2s;}
.ni.active{background:rgba(0,229,255,.06);}
.ni svg{width:18px;height:18px;}
.ni-lbl{font-size:9px;color:var(--muted2);font-weight:500;text-transform:uppercase;}
.ni.active .ni-lbl{color:var(--cyan);}
</style>
</head>
<body>
<div class="toast" id="toast"></div>
<div class="app">

  <div class="header">
    <div class="logo">
      <div class="logo-box"><span>SP</span></div>
      <div class="logo-text">Simply Project <em>AI</em></div>
    </div>
    <div class="user-info">
      <div class="user-email" id="userEmail"></div>
      <div class="user-avatar" id="userAvatar" onclick="logout()">?</div>
      <div class="live-dot"></div>
    </div>
  </div>

  <div class="loading-screen" id="loadingScreen">
    <div class="spin"></div>
    <p id="loadingMsg">正在加载...</p>
    <p style="font-size:10px;color:var(--muted);margin-top:4px" id="loadingDebug"></p>
  </div>

  <div class="scroll" id="mainContent" style="display:none">

    <!-- Voice -->
    <div class="voice-wrap">
      <div class="voice-card">
        <div class="vc-top">
          <div class="mic-btn" id="micBtn" onclick="toggleRec()">
            <svg width="20" height="20" fill="none" viewBox="0 0 24 24">
              <path d="M12 2a3 3 0 0 1 3 3v7a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3z" fill="#00e5ff"/>
              <path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v3M9 22h6" stroke="#00e5ff" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </div>
          <div class="vc-info">
            <h3 id="vcStatus">点击说话或直接输入</h3>
            <p>AI 识别日程，自动加入 Google 日历</p>
          </div>
        </div>
        <div class="waves" id="waves">
          <div class="w"></div><div class="w"></div><div class="w"></div><div class="w"></div>
          <div class="w"></div><div class="w"></div><div class="w"></div><div class="w"></div>
        </div>
        <div class="tbox" id="tbox" contenteditable="true" 
          onclick="if(this.innerHTML.includes('tbox-placeholder'))this.innerHTML=''"
          oninput="onInput()">
          <span class="tbox-placeholder">说出日程，或在这里打字...</span>
        </div>
        <div class="loading-bar" id="loadingBar">
          <div class="spin-sm"></div>
          <span id="loadingBarMsg">AI 分析中...</span>
        </div>
        <div class="ai-reply" id="aiReply">
          <div class="ai-lbl">AI 回复</div>
          <div id="aiReplyText" style="font-size:13px;color:var(--text);line-height:1.7;padding:4px 0"></div>
          <div id="aiEventCard"></div>
        </div>
        <div class="btns">
          <button class="btn btn-rec" id="recBtn" onclick="toggleRec()">🎙 开始录音</button>
          <button class="btn btn-ai" id="aiBtn" onclick="process()" disabled>✦ AI 分析</button>
        </div>
        <div class="qcmds">
          <div class="qcmd" onclick="setInput('下周一下午3点和Mike开会')">下周一3点开会</div>
          <div class="qcmd" onclick="setInput('明天上午10点见客户')">明天见客户</div>
          <div class="qcmd" onclick="setInput('今天有什么安排？')">今天安排</div>
        </div>
      </div>
    </div>

    <!-- Calendar -->
    <div class="cal-wrap">
      <div class="sec-hd">
        <div class="sec-title">日历</div>
        <div style="font-size:11px;color:var(--cyan);cursor:pointer" onclick="loadCal()">🔄 刷新</div>
      </div>
      <div class="week-nav">
        <button class="wnav-btn" onclick="changeWeek(-1)">← 上周</button>
        <div style="font-size:12px;color:var(--text);font-weight:600" id="weekLabel"></div>
        <button class="wnav-btn" onclick="changeWeek(1)">下周 →</button>
      </div>
      <div class="week-strip" id="weekStrip"></div>
      <div class="sec-hd">
        <div class="sec-title" id="dayLabel">今日日程</div>
        <div style="font-size:11px;color:var(--muted2)" id="evCount"></div>
      </div>
      <div id="dayEvents"></div>
      <div class="sec-hd" style="margin-top:12px">
        <div class="sec-title">本周总览</div>
      </div>
      <div id="weekEvents"></div>
    </div>

  </div>

  <!-- Email Compose -->
  <div class="email-wrap" id="emailWrap" style="display:none;padding:14px;">
    <div style="font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted2);margin-bottom:10px;">✉️ 语音写邮件</div>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:8px;">
      <div style="display:flex;gap:8px;margin-bottom:10px;">
        <input id="emailTo" placeholder="收件人邮箱" style="flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:12px;color:var(--text);font-family:'DM Sans',sans-serif;outline:none;">
        <input id="emailSubject" placeholder="主题" style="flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:12px;color:var(--text);font-family:'DM Sans',sans-serif;outline:none;">
      </div>
      <div style="display:flex;gap:8px;margin-bottom:10px;">
        <button onclick="startEmailRec()" id="emailRecBtn" style="flex:1;padding:10px;background:rgba(0,229,255,0.1);border:1px solid rgba(0,229,255,0.2);color:var(--cyan);border-radius:10px;font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;">🎙 口述邮件内容</button>
        <button onclick="aiWriteEmail()" id="aiEmailBtn" style="flex:1;padding:10px;background:rgba(61,106,255,0.15);border:1px solid rgba(61,106,255,0.3);color:#7a9aff;border-radius:10px;font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;" disabled>✦ AI 润色</button>
      </div>
      <!-- Action buttons at TOP - always visible -->
      <div style="display:flex;gap:8px;margin-bottom:10px;">
        <button onclick="openInGmail()" id="gmailBtn" style="flex:2;padding:13px;background:var(--cyan);color:var(--bg);border:none;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;display:none;">🔗 在 Gmail 中打开</button>
        <button onclick="clearEmail()" style="flex:1;padding:13px;background:transparent;border:1px solid var(--border);color:var(--muted2);border-radius:12px;font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif;">🗑 清除</button>
      </div>
      <div id="emailDraft" contenteditable="true" style="background:rgba(0,0,0,0.25);border:1px solid var(--border);border-radius:10px;padding:12px;min-height:340px;font-size:12px;color:var(--text);line-height:1.7;outline:none;margin-bottom:8px;">
        <span style="color:var(--muted);font-style:italic">点击"口述邮件内容"说出大概意思，AI 会帮你写成完整邮件...</span>
      </div>
    </div>
    <!-- Saved drafts -->
    <div id="savedDrafts"></div>
  </div>

  <div class="bnav">
    <div class="ni active">
      <svg fill="none" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" stroke="#00e5ff" stroke-width="1.8"/><line x1="3" y1="10" x2="21" y2="10" stroke="#00e5ff" stroke-width="1.8"/><line x1="8" y1="2" x2="8" y2="6" stroke="#00e5ff" stroke-width="1.8" stroke-linecap="round"/><line x1="16" y1="2" x2="16" y2="6" stroke="#00e5ff" stroke-width="1.8" stroke-linecap="round"/></svg>
      <div class="ni-lbl" style="color:var(--cyan)">日历</div>
    </div>
    <div class="ni" id="navEmail" onclick="switchTab('email')">
      <svg fill="none" viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" stroke="currentColor" stroke-width="1.8"/><polyline points="22,6 12,13 2,6" stroke="currentColor" stroke-width="1.8"/></svg>
      <div class="ni-lbl">邮件</div>
    </div>
    <div class="ni" onclick="window.open('privacy.html')">
      <svg fill="none" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" stroke="currentColor" stroke-width="1.8"/></svg>
      <div class="ni-lbl">隐私</div>
    </div>
    <div class="ni" onclick="logout()">
      <svg fill="none" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <div class="ni-lbl">退出</div>

</div>
<script>
// ── Config ──
const CLIENT_ID = '387089537159-1ndbikl7qbe388llbgv3lcvmut4jik70.apps.googleusercontent.com';

// ── State ──
let token = null;
let isRec = false;
let recog = null;
let transcript = '';
let chatHistory = [];
let weekOffset = 0;
let selectedDate = new Date();
let weekEvents = [];

let sessionState = {
  mode: 'idle',
  pendingCancelEvent: null,
  pendingCreateEvent: null
};

function resetConversation() {
  chatHistory = [];
  sessionState = { mode:'idle', pendingCancelEvent:null, pendingCreateEvent:null };

// ── Date Calculator ──
function getDateMap() {
  const t = new Date();
  const dow = t.getDay();
  const thisMon = new Date(t);
  thisMon.setDate(t.getDate() - (dow === 0 ? 6 : dow - 1));
  thisMon.setHours(0,0,0,0);
  const nextMon = new Date(thisMon);
  nextMon.setDate(thisMon.getDate() + 7);
  const fmt = d => d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日';
  const add = (b,n) => { const d=new Date(b); d.setDate(b.getDate()+n); return d; };
  return {
    today:{label:'今天',date:new Date(t),fmt:fmt(t)},
    tomorrow:{label:'明天',date:add(t,1),fmt:fmt(add(t,1))},
    day_after:{label:'后天',date:add(t,2),fmt:fmt(add(t,2))},
    this_mon:{label:'本周一',date:thisMon,fmt:fmt(thisMon)},
    this_tue:{label:'本周二',date:add(thisMon,1),fmt:fmt(add(thisMon,1))},
    this_wed:{label:'本周三',date:add(thisMon,2),fmt:fmt(add(thisMon,2))},
    this_thu:{label:'本周四',date:add(thisMon,3),fmt:fmt(add(thisMon,3))},
    this_fri:{label:'本周五',date:add(thisMon,4),fmt:fmt(add(thisMon,4))},
    this_sat:{label:'本周六',date:add(thisMon,5),fmt:fmt(add(thisMon,5))},
    next_mon:{label:'下周一',date:nextMon,fmt:fmt(nextMon)},
    next_tue:{label:'下周二',date:add(nextMon,1),fmt:fmt(add(nextMon,1))},
    next_wed:{label:'下周三',date:add(nextMon,2),fmt:fmt(add(nextMon,2))},
    next_thu:{label:'下周四',date:add(nextMon,3),fmt:fmt(add(nextMon,3))},
    next_fri:{label:'下周五',date:add(nextMon,4),fmt:fmt(add(nextMon,4))},
    next_sat:{label:'下周六',date:add(nextMon,5),fmt:fmt(add(nextMon,5))},
    next_sun:{label:'下周日',date:add(nextMon,6),fmt:fmt(add(nextMon,6))},
  };
}

function dateCtxStr() {
  const m = getDateMap();
  return Object.entries(m).map(([k,v])=>`${k}=${v.fmt}`).join(', ');
}

function resolveKey(key) {
  return getDateMap()[key] || getDateMap()['today'];
}

// ── Auth ──
window.addEventListener('load', () => {
  const hash = window.location.hash;

  // Token from URL hash (fresh login via callback.html)
  if (hash && hash.includes('gat=')) {
    const t = hash.split('gat=')[1].split('&')[0];
    if (t && t.length > 10) {
      token = t;
      localStorage.setItem('gat', t);
      localStorage.setItem('gat_time', Date.now().toString());
      history.replaceState(null, '', window.location.pathname);
      checkTokenAndInit();
      return;
    }
  }

  // Token from localStorage
  const stored = localStorage.getItem('gat');
  if (stored && stored.length > 10) {
    token = stored;
    checkTokenAndInit();
    return;
  }

  // No token
  window.location.href = 'auth.html';
});

async function checkTokenAndInit() {
  document.getElementById('loadingMsg').textContent = '验证登录状态...';
  try {
    // Fix 3: Use recommended OpenID Connect endpoint
    const res = await fetch('https://openidconnect.googleapis.com/v1/userinfo', {
      headers: { Authorization: 'Bearer ' + token }
    });

    if (!res.ok) throw new Error('token invalid: ' + res.status);

    const u = await res.json();
    document.getElementById('userEmail').textContent = u.email || '';
    const av = document.getElementById('userAvatar');
    if (u.name) av.textContent = u.name[0].toUpperCase();
    if (u.picture) {
      av.style.backgroundImage = 'url(' + u.picture + ')';
      av.style.backgroundSize = 'cover';
      av.style.fontSize = '0';
    }
    showApp();

  } catch(e) {
    console.error('Token invalid:', e.message);
    localStorage.removeItem('gat');
    // Fix 1: No delay, instant redirect
    window.location.href = 'auth.html';
  }
}

function showApp() {
  document.getElementById('loadingScreen').style.display = 'none';
  document.getElementById('mainContent').style.display = 'block';
  initSpeech();
  buildWeek();

  // Fix 2: Token expiry warning (Google tokens last ~1 hour)
  const savedTime = parseInt(localStorage.getItem('gat_time') || Date.now());
  const expiresIn = 3600000 - (Date.now() - savedTime); // ms until expiry
  const warnAt = expiresIn - 5 * 60 * 1000; // warn 5 min before
  if (warnAt > 0) {
    setTimeout(() => {
      showToast('⚠️ 登录即将过期，请保存工作');
    }, warnAt);
  }
  if (expiresIn > 0) {
    setTimeout(() => {
      localStorage.removeItem('gat');
      showToast('登录已过期，请重新登录');
      setTimeout(() => { window.location.href = 'auth.html'; }, 2000);
    }, expiresIn);
  }
  loadCal();
  // User info already set in checkTokenAndInit
}

function logout() {
  localStorage.removeItem('gat');
  window.location.href = 'auth.html';
}

// ── Claude API ──
async function callAI(system, userMsg) {
  chatHistory.push({ role: 'user', content: userMsg });
  const ctrl = new AbortController();
  const t = setTimeout(() => ctrl.abort(), 25000);
  try {
    const res = await fetch('/api/claude', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ system, messages: chatHistory }),
      signal: ctrl.signal
    });
    clearTimeout(t);
    if (!res.ok) throw new Error('API ' + res.status);
    const d = await res.json();
    chatHistory.push({ role: 'assistant', content: d.text });
    return d.text;
  } catch(e) {
    clearTimeout(t);
    chatHistory.pop();
    throw e.name === 'AbortError' ? new Error('超时，请重试') : e;
  }
}

// ── Transcript correction via Claude (does NOT touch chatHistory) ──
async function correctTranscript(raw) {
  const res = await fetch('/api/claude', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      system: '你是语音识别文字修正助手。将语音识别的原始文字修正为自然流畅的中文表达，保留原意，只修正错别字、断句和语序问题，不添加或删减内容。直接输出修正后的文字，不加任何解释或标点补充说明。',
      messages: [{ role: 'user', content: raw }]
    })
  });
  if (!res.ok) throw new Error('correction ' + res.status);
  const d = await res.json();
  return (d.text || '').trim() || raw;
}

// ── Voice (Dual-mode: SpeechRecognition realtime + Whisper correction) ──
let mediaRecorder = null;
let audioChunks = [];
let srRecog = null;
let srInterim = '';
let micStream = null; // module-level ref so stream can always be released
let recordingTimer = null; // auto-stop timer (max 12s)

function releaseStream() {
  if (micStream) {
    micStream.getTracks().forEach(t => t.stop());
    micStream = null;
  }
}

function initSpeech() {
  if (!navigator.mediaDevices || !window.MediaRecorder) {
    document.getElementById('recBtn').textContent = '⌨️ 请直接输入';
    document.getElementById('vcStatus').textContent = '请在框内直接打字';
  }
}

async function toggleRec() {
  if (isRec) {
    clearTimeout(recordingTimer);
    recordingTimer = null;
    srRecog && srRecog.abort();
    srRecog = null;
    if (mediaRecorder && mediaRecorder.state !== 'inactive') {
      mediaRecorder.stop(); // onstop will call releaseStream()
    } else {
      releaseStream(); // safety: release if mediaRecorder never started
    }
    return;
  }

  releaseStream(); // release any previously leaked stream before acquiring new one

  try {
    micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
  } catch(e) {
    document.getElementById('tbox').innerHTML = '<span style="color:var(--warn);font-size:12px">请在设置里允许麦克风：设置 → Safari → 麦克风 → 允许</span>';
    return;
  }

  // ── 1. SpeechRecognition: realtime interim display ──
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (SR) {
    srRecog = new SR();
    srRecog.lang = 'zh-CN';
    srRecog.continuous = true;
    srRecog.interimResults = true;
    srRecog.onresult = e => {
      let final = '', interim = '';
      for (let i = 0; i < e.results.length; i++) {
        if (e.results[i].isFinal) final += e.results[i][0].transcript;
        else interim += e.results[i][0].transcript;
      }
      srInterim = final + interim;
      // Show realtime text with dim interim suffix
      const tbox = document.getElementById('tbox');
      tbox.innerHTML = '';
      if (final) tbox.appendChild(document.createTextNode(final));
      if (interim) {
        const span = document.createElement('span');
        span.style.cssText = 'color:var(--muted2);font-style:italic';
        span.textContent = interim;
        tbox.appendChild(span);
      }
    };
    srRecog.onerror = () => {}; // silent — Whisper will cover it
    try { srRecog.start(); } catch(e) {}
  }

  // ── 2. MediaRecorder: record full audio for Whisper ──
  const mimeType = ['audio/webm', 'audio/mp4', 'audio/ogg'].find(t => MediaRecorder.isTypeSupported(t)) || '';
  const ext = mimeType.includes('mp4') ? 'mp4' : mimeType.includes('ogg') ? 'ogg' : 'webm';
  audioChunks = [];
  mediaRecorder = new MediaRecorder(micStream, mimeType ? { mimeType } : {});
  mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };

  mediaRecorder.onstart = () => {
    isRec = true;
    document.getElementById('micBtn').classList.add('on');
    document.getElementById('waves').classList.add('on');
    recordingTimer = setTimeout(() => {
      if (mediaRecorder && mediaRecorder.state === 'recording') {
        mediaRecorder.stop();
        showToast('已达最长录音时长 (12s)');
      }
    }, 12000);
    document.getElementById('vcStatus').textContent = '🔴 正在聆听...';
    document.getElementById('recBtn').textContent = '⏹ 停止';
    document.getElementById('recBtn').classList.add('on');
    document.getElementById('tbox').innerHTML = '';
    document.getElementById('aiReply').classList.remove('show');
    document.getElementById('aiBtn').disabled = true;
    srInterim = '';
  };

  mediaRecorder.onstop = async () => {
    releaseStream(); // always release mic, regardless of what follows
    stopRec();

    const blob = new Blob(audioChunks, { type: mimeType || 'audio/webm' });
    if (blob.size < 1000) { showToast('录音太短，请重试'); return; }

    // Keep SR interim text visible while Whisper runs
    document.getElementById('vcStatus').textContent = '✦ Whisper 修正中...';
    document.getElementById('loadingBar').classList.add('show');
    document.getElementById('loadingBarMsg').textContent = 'Whisper 修正识别中...';

    try {
      const res = await fetch(`/api/whisper?filename=audio.${ext}&lang=zh`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/octet-stream' },
        body: blob
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Whisper 失败');

      const rawText = data.text.trim();
      // ── Claude correction layer ──
      document.getElementById('vcStatus').textContent = '✦ Claude 润色中...';
      document.getElementById('loadingBarMsg').textContent = 'Claude AI 润色中...';
      try {
        transcript = await correctTranscript(rawText);
      } catch(ce) {
        transcript = rawText; // fall back to raw Whisper output
      }
      document.getElementById('tbox').textContent = transcript;
      document.getElementById('aiBtn').disabled = !transcript;
    } catch(e) {
      // Whisper failed — fall back to SR interim result
      transcript = srInterim.trim();
      if (transcript) {
        document.getElementById('tbox').textContent = transcript;
        document.getElementById('aiBtn').disabled = false;
        showToast('Whisper 失败，使用实时识别结果');
      } else {
        showToast('识别失败: ' + e.message);
      }
    } finally {
      document.getElementById('loadingBar').classList.remove('show');
      document.getElementById('vcStatus').textContent = '点击说话或直接输入';
    }

    // Auto-process after voice input — restores voice conversation flow
    if (transcript.trim()) process();
  };

  mediaRecorder.start();
}

function stopRec() {
  isRec = false;
  clearTimeout(recordingTimer);
  recordingTimer = null;
  document.getElementById('micBtn').classList.remove('on');
  document.getElementById('waves').classList.remove('on');
  document.getElementById('vcStatus').textContent = '点击说话或直接输入';
  document.getElementById('recBtn').textContent = '🎙 开始录音';
  document.getElementById('recBtn').classList.remove('on');
}

function onInput() {
  const txt = document.getElementById('tbox').innerText.trim();
  transcript = txt;
  document.getElementById('aiBtn').disabled = !txt || txt === '说出日程，或在这里打字...';
}

function setInput(txt) {
  transcript = txt;
  document.getElementById('tbox').textContent = txt;
  document.getElementById('aiBtn').disabled = false;
  showToast('已填入，点击 AI 分析');
}

// ── Process ──
async function process() {
  const txt = transcript.trim();
  if (!txt) return;

  // Handle cancel confirmation state via voice
  if (sessionState.mode === 'cancel_confirm') {
    const yesWords = ['对','是','确认','取消','删掉','删除','可以','好'];
    const noWords = ['不是','不对','不要','算了','先别','保留'];

    if (yesWords.some(w => txt.includes(w))) {
      if (sessionState.pendingCancelEvent && sessionState.pendingCancelEvent.event) {
        const ev = sessionState.pendingCancelEvent.event;
        try {
          await deleteEvById(ev.id);
          speak(ev.summary + ' 已成功取消');
          showToast('✓ 已取消：' + ev.summary);
          document.getElementById('aiReply').classList.remove('show');
          sessionState.mode = 'idle';
          sessionState.pendingCancelEvent = null;
          await loadCal();
        } catch(e) { showToast('取消失败'); }
        return;
      }
      if (sessionState.pendingCancelEvent && sessionState.pendingCancelEvent.candidates) {
        const arr = sessionState.pendingCancelEvent.candidates;
        let idx = 0;
        if (txt.includes('第二')) idx = 1;
        else if (txt.includes('第三')) idx = 2;
        const ev = arr[idx];
        if (ev) {
          try {
            await deleteEvById(ev.id);
            speak(ev.summary + ' 已成功取消');
            showToast('✓ 已取消：' + ev.summary);
            document.getElementById('aiReply').classList.remove('show');
            sessionState.mode = 'idle';
            sessionState.pendingCancelEvent = null;
            await loadCal();
          } catch(e) { showToast('取消失败'); }
          return;
        }
      }
    }

    if (noWords.some(w => txt.includes(w))) {
      speak('好的，保留这个会议。');
      document.getElementById('aiReplyText').textContent = '好的，会议已保留。';
      document.getElementById('aiEventCard').innerHTML = '';
      sessionState.mode = 'idle';
      sessionState.pendingCancelEvent = null;
      return;
    }
  }

  // New task detection - reset conversation for fresh tasks
  const isNewTask = ['新建','安排','创建','取消','删除','改到','改成','帮我'].some(w => txt.includes(w));
  if (sessionState.mode === 'idle' && isNewTask) resetConversation();

  document.getElementById('aiReply').classList.remove('show');
  document.getElementById('loadingBar').classList.add('show');
  document.getElementById('loadingBarMsg').textContent = 'AI 分析中...';
  document.getElementById('aiBtn').disabled = true;

  const evList = weekEvents.map(e => {
    const dt = e.start.dateTime ? new Date(e.start.dateTime).toLocaleString('zh',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit',hour12:false}) : e.start.date;
    return (e.summary||'无标题') + ' (' + dt + ') [id:' + e.id + ']';
  }).join('\n') || '暂无日程';

  const system = `你是AI日历助理，负责多轮对话管理日程。
日期对应（由系统计算，直接用）：${dateCtxStr()}

当前本周日程：
${evList}

规则（只返回JSON，不加其他文字）：
1. 创建事件 → {"action":"create","title":"事件名","day_key":"today","time":"14:00","duration":60,"people":"","location":""}
2. 询问更多信息 → {"action":"ask","reply":"追问内容"}
3. 查询日程 → {"action":"query","reply":"回答内容"}
4. 取消/删除会议 → {"action":"cancel","keyword":"用户提到的关键词"}

day_key选项: today/tomorrow/day_after/this_mon~this_sat/next_mon~next_sun`;

  try {
    const raw = await callAI(system, transcript);
    const clean = raw.replace(/```json|```/g,'').trim();
    const parsed = JSON.parse(clean);

    document.getElementById('loadingBar').classList.remove('show');
    document.getElementById('aiBtn').disabled = false;

    if (parsed.action === 'ask' || parsed.action === 'query') {
      speak(parsed.reply);
      document.getElementById('aiReplyText').textContent = parsed.reply;
      document.getElementById('aiEventCard').innerHTML = '';
      document.getElementById('aiReply').classList.add('show');

    } else if (parsed.action === 'cancel') {
      const keyword = parsed.keyword || '';
      const result = smartMatchEvent(weekEvents, keyword);

      if (!result) {
        speak('我没找到对应的会议，能再说具体一点吗？');
        document.getElementById('aiReplyText').textContent = '没找到匹配的会议，请补充日期、时间或名字。';
        document.getElementById('aiEventCard').innerHTML = '';
        document.getElementById('aiReply').classList.add('show');
        return;
      }

      if (result.ambiguous) {
        sessionState.mode = 'cancel_confirm';
        sessionState.pendingCancelEvent = { candidates: result.candidates };
        const cards = result.candidates.map((ev,i) => {
          const dt2 = ev.start.dateTime ? new Date(ev.start.dateTime).toLocaleString('zh',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit',hour12:false}) : ev.start.date;
          const safeId = ev.id;
          const safeName = (ev.summary||'').replace(/'/g,'`');
          return '<div class="ai-event"><div class="ae-bar" style="background:var(--warn)"></div><div class="ae-info"><div class="ae-title">'+(i+1)+'. '+ev.summary+'</div><div class="ae-meta">'+dt2+'</div></div><button class="ae-btn" style="background:rgba(255,94,94,0.1);border-color:rgba(255,94,94,0.2);color:var(--warn)" onclick="confirmCancel(this.dataset.id,this.dataset.name,this)" data-id="'+safeId+'" data-name="'+safeName+'">取消</button></div>';
        }).join('');
        speak('我找到多个可能的会议，请确认是哪一个。');
        document.getElementById('aiReplyText').textContent = '找到多个会议，请点选或说"第一个""第二个"：';
        document.getElementById('aiEventCard').innerHTML = cards;
        document.getElementById('aiReply').classList.add('show');
        return;
      }

      const match = result.match;
      sessionState.mode = 'cancel_confirm';
      sessionState.pendingCancelEvent = { event: match };
      const dt = match.start.dateTime ? new Date(match.start.dateTime).toLocaleString('zh',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit',hour12:false}) : match.start.date;
      const msg = '找到了：' + match.summary + '（' + dt + '），确认取消吗？';
      speak(msg);
      document.getElementById('aiReplyText').textContent = msg;
      const safeMatchId = match.id;
      const safeMatchName = (match.summary||'').replace(/'/g,'`');
      document.getElementById('aiEventCard').innerHTML = '<div class="ai-event" style="border-left-color:var(--warn)"><div class="ae-bar" style="background:var(--warn)"></div><div class="ae-info"><div class="ae-title">'+match.summary+'</div><div class="ae-meta">'+dt+'</div></div><button class="ae-btn" style="background:rgba(255,94,94,0.1);border-color:rgba(255,94,94,0.2);color:var(--warn)" onclick="confirmCancel(this.dataset.id,this.dataset.name,this)" data-id="'+safeMatchId+'" data-name="'+safeMatchName+'">确认取消</button></div>';
      document.getElementById('aiReply').classList.add('show');

    } else if (parsed.action === 'create') {
      const resolved = resolveKey(parsed.day_key);
      const ev = {
        title: parsed.title,
        date: resolved.fmt,
        resolvedDate: resolved.date,
        time: parsed.time || '10:00',
        duration: parsed.duration || 60,
        people: parsed.people || '',
        location: parsed.location || ''
      };

      const msg = `好的，已为你安排 ${ev.title}，${resolved.label} ${ev.time}`;
      speak(msg);
      document.getElementById('aiReplyText').textContent = msg;

      const btnId = 'addBtn_' + Date.now();
      document.getElementById('aiEventCard').innerHTML = `
        <div class="ai-event">
          <div class="ae-bar"></div>
          <div class="ae-info">
            <div class="ae-title">${ev.title}</div>
            <div class="ae-meta">${ev.date} ${ev.time} · ${ev.duration}分钟${ev.people?' · '+ev.people:''}</div>
          </div>
          <button class="ae-btn" id="${btnId}" onclick="addEv(this, ${JSON.stringify(ev).replace(/"/g,'&quot;')})">+ 加入</button>
        </div>`;
      document.getElementById('aiReply').classList.add('show');

      // Auto-add after 2s
      setTimeout(() => {
        const b = document.getElementById(btnId);
        if (b && !b.classList.contains('done')) b.click();
      }, 2000);
    }
  } catch(e) {
    document.getElementById('loadingBar').classList.remove('show');
    document.getElementById('aiBtn').disabled = false;
    showToast('分析失败: ' + e.message);
  }
}

async function addEv(btn, ev) {
  btn.textContent = '添加中...';
  btn.disabled = true;
  try {
    const [h,m] = ev.time.split(':').map(Number);
    const base = ev.resolvedDate ? new Date(ev.resolvedDate) : new Date();
    const start = new Date(base.getFullYear(), base.getMonth(), base.getDate(), h, m);
    const end = new Date(start.getTime() + (ev.duration||60)*60000);

    const res = await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events', {
      method: 'POST',
      headers: { Authorization: 'Bearer '+token, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        summary: ev.title,
        description: ev.people ? '参与人: '+ev.people : '',
        location: ev.location || '',
        start: { dateTime: start.toISOString(), timeZone: 'Australia/Sydney' },
        end: { dateTime: end.toISOString(), timeZone: 'Australia/Sydney' }
      })
    });

    if (!res.ok) throw new Error('Calendar API ' + res.status);
    btn.textContent = '✓ 已加入';
    btn.classList.add('done');

// ── TTS ──
function speak(txt) {
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(txt);
  u.lang = 'zh-CN'; u.rate = 0.95;
  const voices = window.speechSynthesis.getVoices();
  const zh = voices.find(v => v.lang.includes('zh'));
  if (zh) u.voice = zh;
  // Auto-restart recording after AI finishes speaking — enables voice conversation loop
  u.onend = () => { if (!isRec) toggleRec(); };
  window.speechSynthesis.speak(u);
}

// ── Calendar ──
function changeWeek(d) { weekOffset += d; buildWeek(); loadCal(); }

function buildWeek() {
  const strip = document.getElementById('weekStrip');
  strip.innerHTML = '';
  const days = ['一','二','三','四','五','六','日'];
  const today = new Date();
  const dow = today.getDay();
  const off = (dow===0?-6:1-dow) + weekOffset*7;
  const mon = new Date(today); mon.setDate(today.getDate()+off);
  const sun = new Date(mon); sun.setDate(mon.getDate()+6);
  const wl = document.getElementById('weekLabel');
  if (wl) wl.textContent = (mon.getMonth()+1)+'月'+mon.getDate()+'日 — '+(sun.getMonth()+1)+'月'+sun.getDate()+'日';

  for (let i=0; i<7; i++) {
    const d = new Date(today); d.setDate(today.getDate()+off+i);
    const isToday = d.toDateString()===today.toDateString();
    const isSel = d.toDateString()===selectedDate.toDateString();
    const el = document.createElement('div');
    el.className = 'wd' + (isToday?' today':'') + (isSel&&!isToday?' selected':'');
    el.innerHTML = `<div class="wd-name">周${days[i]}</div><div class="wd-num">${d.getDate()}</div><div class="wd-dot" id="dot${i}"></div>`;
    const cap = new Date(d);
    el.onclick = () => { selectedDate=cap; buildWeek(); renderDay(weekEvents.filter(e=>new Date(e.start.dateTime||e.start.date).toDateString()===cap.toDateString())); };
    strip.appendChild(el);
  }
}

async function loadCal() {
  document.getElementById('dayEvents').innerHTML = '<div class="empty-cal"><p>加载中...</p></div>';
  try {
    const today = new Date();
    const dow = today.getDay();
    const off = (dow===0?-6:1-dow) + weekOffset*7;
    const wStart = new Date(today); wStart.setDate(today.getDate()+off); wStart.setHours(0,0,0,0);
    const wEnd = new Date(wStart); wEnd.setDate(wStart.getDate()+7);

    const res = await fetch(
      `https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${wStart.toISOString()}&timeMax=${wEnd.toISOString()}&singleEvents=true&orderBy=startTime`,
      { headers: { Authorization: 'Bearer '+token } }
    );
    if (res.status===401) { localStorage.removeItem('gat'); window.location.href='auth.html'; return; }
    const data = await res.json();
    weekEvents = data.items || [];

    // Update dots
    document.querySelectorAll('.wd').forEach((el,i) => {
      const d = new Date(today); d.setDate(today.getDate()+off+i);
      const has = weekEvents.some(e => new Date(e.start.dateTime||e.start.date).toDateString()===d.toDateString());
      const dot = document.getElementById('dot'+i);
      if (dot) dot.style.visibility = has ? 'visible' : 'hidden';
    });

    // Show selected day
    const selEvs = weekEvents.filter(e => new Date(e.start.dateTime||e.start.date).toDateString()===selectedDate.toDateString());
    renderDay(selEvs);
    renderWeek(weekEvents);
  } catch(e) {
    document.getElementById('dayEvents').innerHTML = '<div class="empty-cal"><p>加载失败，请刷新</p></div>';
  }
}

function renderDay(evs) {
  const dn = ['周日','周一','周二','周三','周四','周五','周六'];
  const lbl = document.getElementById('dayLabel');
  if (lbl) lbl.textContent = (selectedDate.getMonth()+1)+'月'+selectedDate.getDate()+'日 '+dn[selectedDate.getDay()];
  const cnt = document.getElementById('evCount');
  if (cnt) cnt.textContent = evs.length ? evs.length+' 个事件' : '';
  const c = document.getElementById('dayEvents');
  if (!evs.length) {
    c.innerHTML = '<div class="empty-cal"><div class="ec-icon">📅</div><p>这天没有日程<br>用语音说出来就能添加 🎙</p></div>';
    return;
  }
  c.innerHTML = '';
  evs.forEach(ev => {
    const dt = ev.start.dateTime ? new Date(ev.start.dateTime) : null;
    const endDt = ev.end && ev.end.dateTime ? new Date(ev.end.dateTime) : null;
    const h = dt ? dt.getHours() : 0;
    const displayH = h>12?h-12:h===0?12:h;
    const mn = dt ? String(dt.getMinutes()).padStart(2,'0') : '00';
    const ap = h>=12?'PM':'AM';
    const endStr = endDt ? endDt.toLocaleTimeString('zh',{hour:'2-digit',minute:'2-digit',hour12:false}) : '';
    const loc = ev.location ? '📍 '+ev.location : '';
    const desc = ev.description ? ev.description.slice(0,40) : '';
    const el = document.createElement('div');
    el.className = 'tl-event';
    el.innerHTML = `
      <div class="tl-t">
        <div class="tl-h">${dt?displayH+':'+mn:'全天'}</div>
        <div class="tl-ap">${dt?ap:''}</div>
      </div>
      <div class="tl-div"></div>
      <div class="tl-info">
        <h4>${ev.summary||'无标题'}</h4>
        <p>${endStr?'⏱ 至'+endStr+' ':''} ${loc}</p>
        ${desc?'<p style="margin-top:2px;font-size:10px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:180px">'+desc+'</p>':''}
      </div>
      <button onclick="deleteEv('${ev.id}',this)" style="flex-shrink:0;padding:4px 10px;background:rgba(255,94,94,0.08);border:1px solid rgba(255,94,94,0.2);color:var(--warn);border-radius:8px;font-size:10px;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;">取消</button>`;
    c.appendChild(el);
  });
}

function renderWeek(evs) {
  const c = document.getElementById('weekEvents');
  if (!evs.length) { c.innerHTML = '<div class="empty-cal"><p>本周暂无日程</p></div>'; return; }
  const dn = ['周日','周一','周二','周三','周四','周五','周六'];
  const groups = {};
  evs.forEach(ev => {
    const d = new Date(ev.start.dateTime||ev.start.date);
    const k = d.toDateString();
    if (!groups[k]) groups[k] = { d, evs:[] };
    groups[k].evs.push(ev);
  });
  c.innerHTML = '';
  Object.values(groups).sort((a,b)=>a.d-b.d).forEach(g => {
    const el = document.createElement('div');
    el.className = 'week-group';
    el.innerHTML = `<div class="week-day-lbl">${g.d.getMonth()+1}月${g.d.getDate()}日 ${dn[g.d.getDay()]}</div>`;
    g.evs.forEach(ev => {
      const dt = ev.start.dateTime ? new Date(ev.start.dateTime) : null;
      const t = dt ? dt.toLocaleTimeString('zh',{hour:'2-digit',minute:'2-digit',hour12:false}) : '全天';
      const chip = document.createElement('div');
      chip.className = 'week-ev-chip';
      chip.innerHTML = `<div class="wec-dot" style="background:#ea4335"></div><div><div class="wec-title">${ev.summary||'无标题'}</div><div class="wec-time">${t}</div></div>`;
      el.appendChild(chip);
    });
    c.appendChild(el);
  });
}

// ── Email Voice & Compose (Dual-mode: SpeechRecognition realtime + Whisper correction) ──
let emailMediaRecorder = null;
let emailAudioChunks = [];
let emailSrRecog = null;
let emailSrInterim = '';
let emailIsRec = false;
let emailMicStream = null; // module-level ref for reliable release
let savedDrafts = [];

function releaseEmailStream() {
  if (emailMicStream) {
    emailMicStream.getTracks().forEach(t => t.stop());
    emailMicStream = null;
  }
}

async function startEmailRec() {
  if (emailIsRec) {
    emailSrRecog && emailSrRecog.abort();
    emailSrRecog = null;
    if (emailMediaRecorder && emailMediaRecorder.state !== 'inactive') {
      emailMediaRecorder.stop(); // onstop will call releaseEmailStream()
    } else {
      releaseEmailStream();
    }
    return;
  }

  releaseEmailStream(); // release any previously leaked stream

  try {
    emailMicStream = await navigator.mediaDevices.getUserMedia({ audio: true });
  } catch(e) { showToast('请允许麦克风权限'); return; }

  // ── 1. SpeechRecognition: realtime interim display ──
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (SR) {
    emailSrRecog = new SR();
    emailSrRecog.lang = 'zh-CN';
    emailSrRecog.continuous = true;
    emailSrRecog.interimResults = true;
    emailSrRecog.onresult = e => {
      let final = '', interim = '';
      for (let i = 0; i < e.results.length; i++) {
        if (e.results[i].isFinal) final += e.results[i][0].transcript;
        else interim += e.results[i][0].transcript;
      }
      emailSrInterim = final + interim;
      const el = document.getElementById('emailDraft');
      el.innerHTML = '';
      if (final) el.appendChild(document.createTextNode(final));
      if (interim) {
        const span = document.createElement('span');
        span.style.cssText = 'color:var(--muted2);font-style:italic';
        span.textContent = interim;
        el.appendChild(span);
      }
    };
    emailSrRecog.onerror = () => {};
    try { emailSrRecog.start(); } catch(e) {}
  }

  // ── 2. MediaRecorder: record full audio for Whisper ──
  const mimeType = ['audio/webm', 'audio/mp4', 'audio/ogg'].find(t => MediaRecorder.isTypeSupported(t)) || '';
  const ext = mimeType.includes('mp4') ? 'mp4' : mimeType.includes('ogg') ? 'ogg' : 'webm';

  emailAudioChunks = [];
  emailSrInterim = '';
  emailMediaRecorder = new MediaRecorder(emailMicStream, mimeType ? { mimeType } : {});
  emailMediaRecorder.ondataavailable = e => { if (e.data.size > 0) emailAudioChunks.push(e.data); };

  emailMediaRecorder.onstart = () => {
    emailIsRec = true;
    document.getElementById('emailRecBtn').textContent = '⏹ 停止';
    document.getElementById('emailDraft').innerHTML = '<span style="color:var(--muted2)">正在聆听...</span>';
  };

  emailMediaRecorder.onstop = async () => {
    releaseEmailStream(); // always release mic first
    emailIsRec = false;
    document.getElementById('emailRecBtn').textContent = '🎙 口述邮件内容';

    const blob = new Blob(emailAudioChunks, { type: mimeType || 'audio/webm' });
    if (blob.size < 1000) { showToast('录音太短，请重试'); return; }

    document.getElementById('emailDraft').innerHTML = '<span style="color:var(--muted2)">✦ Whisper 修正中...</span>';

    try {
      const res = await fetch(`/api/whisper?filename=audio.${ext}&lang=zh`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/octet-stream' },
        body: blob
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Whisper 失败');

      document.getElementById('emailDraft').textContent = data.text.trim();
      document.getElementById('aiEmailBtn').disabled = false;
      showToast('录音完成，点击 AI 润色');
    } catch(e) {
      // Fall back to SR result
      if (emailSrInterim.trim()) {
        document.getElementById('emailDraft').textContent = emailSrInterim.trim();
        document.getElementById('aiEmailBtn').disabled = false;
        showToast('Whisper 失败，使用实时识别结果');
      } else {
        showToast('识别失败: ' + e.message);
        document.getElementById('emailDraft').textContent = '';
      }
    }
  };

  emailMediaRecorder.start();
}

// ── Delete Event ──
async function deleteEvById(eventId) {
  const res = await fetch(
    'https://www.googleapis.com/calendar/v3/calendars/primary/events/' + eventId,
    { method: 'DELETE', headers: { Authorization: 'Bearer ' + token } }
  );
  if (!res.ok && res.status !== 204) throw new Error('删除失败 ' + res.status);
}

// upgraded smartMatchEvent
function smartMatchEvent(events, keyword) {
  keyword = (keyword || '').toLowerCase().trim();
  if (!keyword) return null;

  const now = new Date();
  const tomorrow = new Date(); tomorrow.setDate(now.getDate()+1);

  function getDayScore(evDate, kw) {
    let score = 0;
    if (kw.includes('今天') && evDate.toDateString()===now.toDateString()) score += 8;
    if (kw.includes('明天') && evDate.toDateString()===tomorrow.toDateString()) score += 8;
    const wdMap = {'周一':1,'星期一':1,'周二':2,'星期二':2,'周三':3,'星期三':3,'周四':4,'星期四':4,'周五':5,'星期五':5,'周六':6,'星期六':6,'周日':0,'星期日':0,'周天':0,'星期天':0};
    for (const k in wdMap) { if (kw.includes(k) && evDate.getDay()===wdMap[k]) score += 6; }
    if (kw.includes('上午') && evDate.getHours()<12) score += 3;
    if (kw.includes('下午') && evDate.getHours()>=12) score += 3;
    if (kw.includes('晚上') && evDate.getHours()>=18) score += 3;
    return score;
  }

  function getTimeScore(evDate, kw) {
    let score = 0;
    const hm = kw.match(/(\d{1,2})[:点](\d{0,2})?/);
    if (hm) {
      const kh = parseInt(hm[1],10);
      const km = hm[2] ? parseInt(hm[2],10) : 0;
      if (evDate.getHours()===kh) score += 5;
      if (evDate.getMinutes()===km) score += 2;
    }
    return score;
  }

  function getTextScore(text, kw) {
    let score = 0;
    if (text.includes(kw)) score += 10;
    const parts = kw.split(/[\s，。、]+/).filter(p => p.length > 0);
    parts.forEach(p => {
      if (p.length>=2 && text.includes(p)) score += 4;
      else if (p.length===1 && text.includes(p)) score += 1;
    });
    return score;
  }

  const ranked = events.map(ev => {
    const evDate = new Date(ev.start.dateTime||ev.start.date);
    const text = [(ev.summary||''),(ev.location||''),(ev.description||'')].join(' ').toLowerCase();
    let score = getTextScore(text,keyword) + getDayScore(evDate,keyword) + getTimeScore(evDate,keyword);
    const diffH = Math.abs(evDate-now)/3600000;
    if (diffH<24) score += 2;
    if (diffH<3) score += 2;
    return {ev, score};
  }).sort((a,b)=>b.score-a.score);

  if (!ranked.length || ranked[0].score<5) return null;
  if (ranked[1] && ranked[0].score-ranked[1].score<=2) {
    return { ambiguous:true, candidates:ranked.slice(0,3).map(x=>x.ev) };
  }
  return { ambiguous:false, match:ranked[0].ev };
}

// ── Toast ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
