<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>登录中...</title>
<style>body{background:#07090f;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;font-family:sans-serif;}.msg{color:#00e5ff;font-size:14px;text-align:center;}.spin{width:24px;height:24px;border:2px solid rgba(0,229,255,0.2);border-top-color:#00e5ff;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px;}@keyframes spin{to{transform:rotate(360deg);}}</style>
</head>
<body>
<div class="msg"><div class="spin"></div><div id="msg">正在登录...</div></div>
<script>
(function() {
  var hash = window.location.hash;
  var token = null;

  if (hash && hash.indexOf('access_token') !== -1) {
    var params = new URLSearchParams(hash.substring(1));
    token = params.get('access_token');
  }

  if (token && token.length > 10) {
    // Save to localStorage
    try {
      localStorage.setItem('gat', token);
      localStorage.setItem('gat_time', Date.now().toString());
    } catch(e) {}
    document.getElementById('msg').textContent = '登录成功，跳转中...';
    // Pass token via URL hash as backup
    setTimeout(function() {
      window.location.replace('app.html#gat=' + token);
    }, 300);
  } else {
    document.getElementById('msg').textContent = '登录失败，重试...';
    setTimeout(function() {
      window.location.replace('auth.html');
    }, 1500);
  }
})();
</script>
</body>
</html>
